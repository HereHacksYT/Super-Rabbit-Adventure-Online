<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Rabbit Adventure (Online)</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; user-select: none; background-color: #000; }
        #canvas-container { width: 100%; height: 100%; display: block; }
        
        /* SUPER BEAR TARZI LOBİ PANELİ */
        #lobby-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-family: 'Arial', sans-serif; color: white;
        }
        .lobby-box { background: rgba(0, 0, 0, 0.6); padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 300px; }
        h1 { margin-bottom: 20px; font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        .lobby-btn {
            background: #ff9800; color: white; border: none; padding: 12px 20px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer;
            width: 100%; margin: 10px 0; transition: 0.2s; box-shadow: 0 4px 0 #e65100;
        }
        .lobby-btn:active { transform: translateY(4px); box-shadow: none; }
        .room-input {
            width: 90%; padding: 10px; font-size: 18px; text-align: center;
            border-radius: 8px; border: 2px solid #ccc; margin-top: 10px; text-transform: uppercase;
        }
        
        /* ODA BİLGİSİ EKRANI */
        #room-info {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7);
            color: #fff; padding: 10px 15px; font-family: Arial; font-weight: bold;
            border-radius: 8px; z-index: 100; pointer-events: none; font-size: 14px;
        }

        /* MOBİL MOBİL BUTONLAR */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 10; touch-action: none; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 40px; height: 40px; background: #fff; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .action-btn { position: absolute; width: 70px; height: 70px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 14px; z-index: 10; box-shadow: 0 6px 0 rgba(0,0,0,0.3); }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        #jump-button { bottom: 50px; right: 130px; background: #2196f3; box-shadow: 0 6px 0 #0d47a1; }
        #attack-button { bottom: 70px; right: 40px; background: #f44336; box-shadow: 0 6px 0 #b71c1c; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="lobby-container">
        <div class="lobby-box">
            <h1>RABBIT ONLINE</h1>
            <button class="lobby-btn" onclick="createRoom()">ODA OLUŞTUR</button>
            <hr style="border: 1px solid rgba(255,255,255,0.2); margin: 20px 0;">
            <input type="text" id="room-code-input" class="room-input" placeholder="ODA KODU GİR" maxlength="5">
            <button class="lobby-btn" style="background:#4caf50; box-shadow: 0 4px 0 #1b5e20;" onclick="joinRoom()">ODAYA KATIL</button>
        </div>
    </div>

    <div id="room-info" style="display: none;">
        ODA KODU: <span id="current-room-text" style="color: #ff9800;">-----</span><br>
        ODADAKİLER: <span id="player-count-text">1</span>
    </div>

    <div id="canvas-container"></div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <button id="jump-button" class="action-btn">ZIPLA</button>
    <button id="attack-button" class="action-btn">KAFA AT</button>

    <script src="client.js"></script>
</body>
</html>
